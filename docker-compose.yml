services:

  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama
    depends_on:
      - ollama
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        echo 'Attente démarrage Ollama...' &&
        until ollama list > /dev/null 2>&1; do sleep 2; done &&
        echo 'Pull gemma3:4b...' &&
        ollama pull gemma3:4b &&
        echo 'Pull qwen2.5vl:7b...' &&
        ollama pull qwen2.5vl:7b &&
        echo 'Modèles prêts.'
      "
    restart: "no"

  app:
    build: .
    ports:
      - "8082:80"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_TEXT_MODEL=gemma3:4b
      - OLLAMA_VISION_MODEL=qwen2.5vl:7b
      - OLLAMA_TIMEOUT=1800
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
